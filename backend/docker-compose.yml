version: '3.8'

services:

  backend:
    build: . 
    container_name: anime_backend
    restart: unless-stopped 
    ports:
      - "8000:8000" 
    env_file:
      - .env 
    depends_on:
      db:
        condition: service_healthy 
      redis:
        condition: service_healthy
    networks:
      - anime_network

  db:
    image: postgres:15
    container_name: anime_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_DATABASE}"]
      interval: 100s 
      timeout: 5s
      retries: 5
    networks:
      - anime_network

  redis:
    image: redis:7
    container_name: anime_redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s 
      timeout: 5s
      retries: 5
    networks:
      - anime_network

volumes:
  postgres_data:
  redis_data:

networks:
  anime_network:
    driver: bridge